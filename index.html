<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.N.S.H. AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .chat-box::-webkit-scrollbar { width: 6px; }
        .chat-box::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 3px; }
    </style>
</head>
<body class="h-screen flex flex-col justify-between font-sans">

    <header class="border-b border-slate-800 p-4 text-center bg-slate-900/50 backdrop-blur">
        <h1 class="text-2xl font-bold tracking-wider text-cyan-400">A.N.S.H.</h1>
        <p class="text-xs text-slate-400 uppercase tracking-widest">Artificial Neural System and Helper</p>
    </header>

    <main id="chat-box" class="chat-box flex-1 overflow-y-auto p-4 space-y-4 max-w-3xl w-full mx-auto">
        <div class="flex gap-3 max-w-[85%]">
            <div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none shadow-md">
                Hello! I am A.N.S.H. How can I assist you today?
            </div>
        </div>
    </main>

    <footer class="p-4 border-t border-slate-800 bg-slate-900/50 backdrop-blur">
        <form id="chat-form" class="max-w-3xl w-full mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ask A.N.S.H. anything..." autocomplete="off"
                class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-500 transition-colors">
            <button type="submit" 
                class="bg-cyan-600 hover:bg-cyan-500 text-white font-medium px-6 py-3 rounded-xl transition-colors">
                Send
            </button>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatBox = document.getElementById('chat-box');
        
        // Context history array
        let conversationHistory = [];

        function appendMessage(text, isUser) {
            const wrapper = document.createElement('div');
            wrapper.className = isUser ? "flex gap-3 max-w-[85%] ml-auto justify-end" : "flex gap-3 max-w-[85%]";
            
            const msgBubble = document.createElement('div');
            msgBubble.className = isUser 
                ? "bg-cyan-600 p-3 rounded-2xl rounded-tr-none shadow-md text-white" 
                : "bg-slate-800 p-3 rounded-2xl rounded-tl-none shadow-md text-slate-100";
            
            msgBubble.innerText = text;
            wrapper.appendChild(msgBubble);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = userInput.value.trim();
            if (!message) return;

            // Render user message
            appendMessage(message, true);
            userInput.value = '';

            // Update conversation history
            conversationHistory.push({ role: "user", content: message });

            // Create loading placeholder for AI
            const loadingWrapper = document.createElement('div');
            loadingWrapper.className = "flex gap-3 max-w-[85%]";
            loadingWrapper.innerHTML = `<div class="bg-slate-800 p-3 rounded-2xl rounded-tl-none text-slate-400 animate-pulse">A.N.S.H. is thinking...</div>`;
            chatBox.appendChild(loadingWrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // Call Netlify background function
                const response = await fetch('/.netlify/functions/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                chatBox.removeChild(loadingWrapper); // Remove typing indicator

                if (data.choices && data.choices[0].message) {
                    const aiReply = data.choices[0].message.content;
                    appendMessage(aiReply, false);
                    conversationHistory.push({ role: "assistant", content: aiReply });
                } else {
                    appendMessage("Error: Could not retrieve a proper response.", false);
                }

            } catch (err) {
                chatBox.removeChild(loadingWrapper);
                appendMessage("Failed to reach A.N.S.H. Check connection.", false);
                console.error(err);
            }
        });
    </script>
</body>
</html>
