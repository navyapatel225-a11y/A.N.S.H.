<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A.N.S.H.</title>

<style>
body {
    margin: 0;
    font-family: system-ui;
    background: #0f172a;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

header {
    padding: 12px;
    text-align: center;
    background: #111827;
    font-weight: bold;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
}

.user {
    background: #06b6d4;
    margin-left: auto;
    color: black;
}

.ai {
    background: #1f2937;
}

form {
    display: flex;
    padding: 10px;
    background: #111827;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    margin-left: 8px;
    padding: 10px 16px;
    border: none;
    background: #06b6d4;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>A.N.S.H. AI</header>

<div id="chat"></div>

<form id="form">
    <input id="input" placeholder="Ask something..." />
    <button>Send</button>
</form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

let messages = [];

function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    messages.push({ role: "user", content: text });
    input.value = "";

    const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "No response";

    addMsg(reply, "ai");
    messages.push({ role: "assistant", content: reply });
});
</script>

</body>
</html>
