<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.N.S.H. AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: #0b141a;
    color: #f8fafc;
    font-family: system-ui;
}

/* scroll */
.chat-box::-webkit-scrollbar { width: 6px; }
.chat-box::-webkit-scrollbar-thumb {
    background-color: #1f2c33;
    border-radius: 3px;
}

/* animation */
.msg {
    animation: pop 0.2s ease;
}
@keyframes pop {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
}

/* header like WhatsApp */
header {
    background: #111b21;
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- HEADER -->
<header class="border-b border-slate-800 p-4 flex items-center justify-between">
    <div>
        <h1 class="text-lg font-bold text-green-400">🟢 A.N.S.H</h1>
        <p class="text-xs text-slate-400">online</p>
    </div>
</header>

<!-- CHAT AREA -->
<main id="chat-box" class="chat-box flex-1 overflow-y-auto p-4 space-y-3 max-w-3xl w-full mx-auto">

    <div class="msg flex">
        <div class="bg-[#202c33] text-white p-3 rounded-xl rounded-tl-none shadow max-w-[80%]">
            Yo 👋 I'm A.N.S.H
        </div>
    </div>

</main>

<!-- INPUT -->
<footer class="p-3 bg-[#111b21] border-t border-slate-800">
    <form id="chat-form" class="max-w-3xl mx-auto flex gap-2">

        <input id="user-input"
        type="text"
        placeholder="Message A.N.S.H..."
        class="flex-1 bg-[#202c33] border border-slate-700 rounded-full px-4 py-3 text-white outline-none">

        <button class="bg-green-500 hover:bg-green-400 px-5 py-2 rounded-full font-medium">
            ➤
        </button>

    </form>
</footer>

<script>
const chatForm = document.getElementById('chat-form');
const userInput = document.getElementById('user-input');
const chatBox = document.getElementById('chat-box');

let conversationHistory = [];

function appendMessage(text, isUser) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg flex ${isUser ? "justify-end" : ""}`;

    const bubble = document.createElement('div');

    bubble.className = isUser
        ? "bg-[#005c4b] text-white p-3 rounded-xl rounded-tr-none shadow max-w-[80%]"
        : "bg-[#202c33] text-white p-3 rounded-xl rounded-tl-none shadow max-w-[80%]";

    bubble.innerText = text;

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);

    chatBox.scrollTop = chatBox.scrollHeight;
}

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const message = userInput.value.trim();
    if (!message) return;

    appendMessage(message, true);
    userInput.value = "";

    conversationHistory.push({ role: "user", content: message });

    // typing indicator
    const load = document.createElement('div');
    load.className = "msg flex";
    load.innerHTML = `
        <div class="bg-[#202c33] p-3 rounded-xl text-slate-400 animate-pulse">
            A.N.S.H is typing...
        </div>`;
    chatBox.appendChild(load);

    try {
        const res = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await res.json();
        chatBox.removeChild(load);

        const reply = data.choices?.[0]?.message?.content || "No response";
        appendMessage(reply, false);

        conversationHistory.push({ role: "assistant", content: reply });

    } catch (err) {
        chatBox.removeChild(load);
        appendMessage("Connection error ⚠️", false);
    }
});
</script>

</body>
</html>
