<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A.N.S.H. AI</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

body {
    margin: 0;
    font-family: Inter;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: radial-gradient(circle at top, #0ea5e9, #0f172a 45%, #020617);
    color: white;
    overflow: hidden;
}

/* HEADER */
header {
    padding: 14px;
    text-align: center;
    font-weight: 600;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    position: relative;
}

header::after {
    content: "● LIVE";
    position: absolute;
    right: 20px;
    top: 14px;
    font-size: 12px;
    color: #22c55e;
}

/* CHAT */
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* MESSAGE */
.msg {
    max-width: 75%;
    padding: 12px 14px;
    margin: 10px 0;
    border-radius: 16px;
    animation: pop 0.2s ease;
}

@keyframes pop {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.user {
    background: linear-gradient(135deg, #06b6d4, #3b82f6);
    margin-left: auto;
    color: black;
}

.ai {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
form {
    display: flex;
    padding: 14px;
    gap: 10px;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.08);
    color: white;
}

button {
    padding: 14px 18px;
    border-radius: 12px;
    border: none;
    background: linear-gradient(135deg, #06b6d4, #6366f1);
    color: white;
    font-weight: 600;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
⚡ A.N.S.H. AI
<div style="font-size:12px; opacity:0.7;">
Artificial Neural System for Helping
</div>
</header>

<div id="chat"></div>

<form id="form">
    <input id="input" placeholder="Ask A.N.S.H. anything..." />
    <button>Send</button>
</form>

<script>
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

let messages = [];

// initial message
add("⚡ A.N.S.H. ONLINE\nReady to assist you.", "ai");

function add(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    add(text, "user");
    messages.push({ role: "user", content: text });
    input.value = "";

    const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
    });

    const data = await res.json();
    const reply = data.choices?.[0]?.message?.content || "No response";

    typeMessage(reply);
    messages.push({ role: "assistant", content: reply });
});

function typeMessage(text) {
    let i = 0;
    const div = document.createElement("div");
    div.className = "msg ai";
    chat.appendChild(div);

    const interval = setInterval(() => {
        div.innerText += text[i];
        i++;
        chat.scrollTop = chat.scrollHeight;

        if (i >= text.length) clearInterval(interval);
    }, 12);
}
</script>

</body>
</html>
