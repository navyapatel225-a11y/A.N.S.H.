<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.N.S.H AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background:#0f172a;
    color:white;
}

.chat-box::-webkit-scrollbar {
    width:6px;
}
.chat-box::-webkit-scrollbar-thumb {
    background:#334155;
    border-radius:5px;
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="flex flex-col items-center justify-center h-full gap-3">
    <h1 class="text-2xl font-bold">A.N.S.H AI Login</h1>

    <input id="email" type="email"
        class="p-3 rounded text-black w-64"
        placeholder="Enter email">

    <button onclick="login()"
        class="bg-cyan-500 px-5 py-2 rounded">
        Send Magic Link
    </button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="flex flex-col h-full">

<header class="p-3 border-b border-slate-700 text-center">
    <h1 class="text-xl">⚡ A.N.S.H AI</h1>
</header>

<main id="chat" class="chat-box flex-1 overflow-y-auto p-3 space-y-2"></main>

<form id="form" class="p-3 flex gap-2 border-t border-slate-700">
    <input id="input" class="flex-1 p-2 rounded text-black" placeholder="Ask something...">
    <button class="bg-green-500 px-4 rounded">Send</button>
</form>

</div>

<script>

// 🔐 SUPABASE INIT
const supabase = window.supabase.createClient(
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
);

// elements
const loginScreen = document.getElementById("loginScreen");
const app = document.getElementById("app");
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

// ---------------- LOGIN ----------------
async function login() {
    const email = document.getElementById("email").value;

    const { error } = await supabase.auth.signInWithOtp({
        email
    });

    if (error) {
        alert(error.message);
    } else {
        alert("Check your email for login link 🚀");
    }
}

// ---------------- CHECK USER ----------------
async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        loginScreen.style.display = "none";
        app.style.display = "flex";
    }
}

checkUser();

// auto refresh session
supabase.auth.onAuthStateChange(() => {
    checkUser();
});

// ---------------- CHAT ----------------
function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = type === "user"
        ? "text-right bg-cyan-600 p-2 rounded"
        : "text-left bg-slate-700 p-2 rounded";

    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

let history = [];

form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    history.push({ role: "user", content: text });
    input.value = "";

    addMsg("Thinking...", "ai");

    const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages: history })
    });

    const data = await res.json();

    chat.lastChild.remove();

    const reply = data.choices?.[0]?.message?.content || "Error";
    addMsg(reply, "ai");

    history.push({ role: "assistant", content: reply });
});

</script>

</body>
</html>
