<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.N.S.H. AI</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: radial-gradient(circle at top, #1e1b4b, #0f172a);
    color: #f8fafc;
    font-family: system-ui;
}

/* scroll */
.chat-box::-webkit-scrollbar { width: 6px; }
.chat-box::-webkit-scrollbar-thumb {
    background-color: #334155;
    border-radius: 3px;
}

/* message animation */
.msg {
    animation: pop 0.25s ease;
}
@keyframes pop {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

/* glass header */
header {
    background: rgba(15, 23, 42, 0.7);
    backdrop-filter: blur(10px);
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- HEADER -->
<header class="border-b border-slate-800 p-4 text-center">
    <h1 class="text-2xl font-bold tracking-wider text-cyan-400">A.N.S.H.</h1>
    <p class="text-xs text-slate-400">Artificial Neural System and Helper</p>
</header>

<!-- CHAT AREA -->
<main id="chat-box" class="chat-box flex-1 overflow-y-auto p-4 space-y-3 max-w-3xl w-full mx-auto">

    <div class="msg flex">
        <div class="bg-slate-800/70 backdrop-blur p-3 rounded-2xl rounded-tl-none shadow">
            Yo 👋 I'm A.N.S.H. What’s up?
        </div>
    </div>

</main>

<!-- INPUT -->
<footer class="p-4 border-t border-slate-800 bg-slate-900/40 backdrop-blur">
    <form id="chat-form" class="max-w-3xl mx-auto flex gap-2">

        <input id="user-input"
        type="text"
        placeholder="Message A.N.S.H..."
        class="flex-1 bg-slate-800/70 backdrop-blur border border-slate-700 rounded-full px-4 py-3 text-white outline-none focus:border-cyan-500">

        <button class="bg-cyan-600 hover:bg-cyan-500 px-5 py-3 rounded-full font-medium">
            Send
        </button>

    </form>
</footer>

<script>
const chatForm = document.getElementById('chat-form');
const userInput = document.getElementById('user-input');
const chatBox = document.getElementById('chat-box');

let conversationHistory = [];

function appendMessage(text, isUser) {
    const wrapper = document.createElement('div');
    wrapper.className = `msg flex ${isUser ? "justify-end" : ""}`;

    const bubble = document.createElement('div');

    bubble.className = isUser
        ? "bg-cyan-600 text-white p-3 rounded-2xl rounded-tr-none shadow max-w-[80%]"
        : "bg-slate-800/70 backdrop-blur p-3 rounded-2xl rounded-tl-none shadow max-w-[80%]";

    bubble.innerText = text;

    wrapper.appendChild(bubble);
    chatBox.appendChild(wrapper);

    chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: "smooth" });
}

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const message = userInput.value.trim();
    if (!message) return;

    appendMessage(message, true);
    userInput.value = "";

    conversationHistory.push({ role: "user", content: message });

    // loading
    const load = document.createElement('div');
    load.className = "msg flex";
    load.innerHTML = `<div class="bg-slate-800 p-3 rounded-2xl text-slate-400 animate-pulse">A.N.S.H. thinking... ⚡</div>`;
    chatBox.appendChild(load);

    try {
        const res = await fetch('/.netlify/functions/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: conversationHistory })
        });

        const data = await res.json();
        chatBox.removeChild(load);

        const reply = data.choices?.[0]?.message?.content || "No response";
        appendMessage(reply, false);

        conversationHistory.push({ role: "assistant", content: reply });

    } catch (err) {
        chatBox.removeChild(load);
        appendMessage("Error connecting to A.N.S.H.", false);
    }
});
</script>

</body>
</html>
