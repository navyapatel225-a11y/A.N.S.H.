<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A.N.S.H. | Intelligence</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        /* Base & Scrollbar */
        body { background-color: #09090b; color: #e4e4e7; font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #3f3f46; }

        /* Premium Markdown Styling */
        .prose { font-size: 0.95rem; line-height: 1.6; }
        .prose p { margin-bottom: 0.8rem; }
        .prose p:last-child { margin-bottom: 0; }
        .prose pre { background-color: #000000; padding: 1rem; border-radius: 0.75rem; overflow-x: auto; margin: 1rem 0; border: 1px solid #27272a; }
        .prose code { color: #22d3ee; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.85em; background: #18181b; padding: 0.15rem 0.3rem; border-radius: 0.3rem; }
        .prose pre code { background: transparent; padding: 0; color: #e4e4e7; }
        .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.8rem; }
        .prose ol { list-style-type: decimal; padding-left: 1.5rem; margin-bottom: 0.8rem; }
        .prose strong { color: #ffffff; font-weight: 600; }
        .prose h1, .prose h2, .prose h3 { color: #ffffff; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; letter-spacing: -0.025em; }

        /* Smooth Slide-up Animation for Messages */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-animate { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Sleek Typing Indicator */
        .typing-pulse { display: flex; gap: 4px; align-items: center; height: 24px; padding: 0 4px; }
        .typing-pulse span { width: 4px; height: 4px; background-color: #22d3ee; border-radius: 50%; animation: pulse 1.4s infinite ease-in-out both; }
        .typing-pulse span:nth-child(1) { animation-delay: -0.32s; }
        .typing-pulse span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; box-shadow: 0 0 8px #22d3ee; } }
    </style>
</head>
