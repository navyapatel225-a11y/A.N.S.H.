<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.N.S.H AI</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    background:#0f172a;
    color:white;
}

.chat {
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding: 10px;
}

.msg {
    margin: 6px 0;
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    word-wrap: break-word;
}

.user {
    background:#06b6d4;
    margin-left:auto;
}

.ai {
    background:#334155;
}
</style>
</head>

<body class="flex flex-col h-screen">

<!-- LOGIN -->
<div id="login" class="flex flex-col items-center justify-center h-screen gap-4">
    <h1 class="text-2xl font-bold">⚡ A.N.S.H AI</h1>

    <button onclick="loginWithGoogle()"
        class="bg-white text-black px-6 py-3 rounded-xl">
        Continue with Google
    </button>
</div>

<!-- APP -->
<div id="app" class="hidden flex flex-col h-screen">

<header class="p-3 border-b border-slate-700 text-center">
    A.N.S.H AI
</header>

<div id="chat" class="chat"></div>

<form id="form" class="p-3 flex gap-2 border-t border-slate-700">
    <input id="input" class="flex-1 p-2 rounded text-black" placeholder="Ask something...">
    <button class="bg-green-500 px-4 rounded">Send</button>
</form>

</div>

<script>

// 🔐 SUPABASE
const supabase = window.supabase.createClient(
    "SUPABASE_URL",
    "SUPABASE_ANON_KEY"
);

let user = null;
let messages = [];

const loginScreen = document.getElementById("login");
const app = document.getElementById("app");
const chat = document.getElementById("chat");
const form = document.getElementById("form");
const input = document.getElementById("input");

// ---------------- LOGIN ----------------
async function loginWithGoogle() {
    const { error } = await supabase.auth.signInWithOAuth({
        provider: "google",
        options: {
            redirectTo: window.location.origin
        }
    });

    if (error) alert(error.message);
}

// ---------------- CHECK USER ----------------
async function checkUser() {
    const { data } = await supabase.auth.getUser();

    if (data.user) {
        user = data.user;
        loginScreen.style.display = "none";
        app.classList.remove("hidden");
    }
}

checkUser();

supabase.auth.onAuthStateChange(() => {
    checkUser();
});

// ---------------- UI ----------------
function addMsg(text, type) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// ---------------- SEND MESSAGE ----------------
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const text = input.value.trim();
    if (!text) return;

    if (!user) {
        alert("Login required!");
        return;
    }

    addMsg(text, "user");
    messages.push({ role: "user", content: text });
    input.value = "";

    addMsg("Thinking...", "ai");

    const res = await fetch("/.netlify/functions/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            messages,
            userEmail: user.email
        })
    });

    const data = await res.json();

    chat.lastChild.remove();

    const reply = data.choices?.[0]?.message?.content || "Error";
    addMsg(reply, "ai");

    messages.push({ role: "assistant", content: reply });
});

</script>

</body>
</html>
