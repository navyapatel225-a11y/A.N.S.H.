<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A.N.S.H Messages</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  background:#000;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:white;
  overflow:hidden;
}

/* glass top bar */
.topbar{
  background:rgba(28,28,30,0.8);
  backdrop-filter: blur(20px);
}

/* chat area */
#chat::-webkit-scrollbar{width:6px;}
#chat::-webkit-scrollbar-thumb{background:#2c2c2e;border-radius:10px;}

/* bubble animation */
.msg{animation:pop .15s ease;}
@keyframes pop{
  from{opacity:0;transform:scale(0.98);}
  to{opacity:1;transform:scale(1);}
}
</style>
</head>

<body class="h-screen flex flex-col">

<!-- TOP BAR -->
<div class="topbar p-3 text-center border-b border-zinc-800">
  <div class="text-sm text-zinc-400">iMessage</div>
  <div class="font-semibold text-white">A.N.S.H 💬</div>
</div>

<!-- CHAT -->
<div id="chat" class="flex-1 overflow-y-auto p-3 space-y-2">

  <div class="msg flex">
    <div class="bg-zinc-800 text-white px-4 py-2 rounded-2xl max-w-[75%]">
      Hey 👋 I’m A.N.S.H
    </div>
  </div>

</div>

<!-- INPUT -->
<form id="form" class="p-3 border-t border-zinc-900 flex gap-2 bg-black">

  <input id="input"
    class="flex-1 bg-zinc-900 text-white px-4 py-2 rounded-full outline-none"
    placeholder="iMessage..." />

  <button class="bg-blue-500 px-4 py-2 rounded-full font-semibold">
    ↑
  </button>

</form>

<script>
const chat=document.getElementById("chat");
const form=document.getElementById("form");
const input=document.getElementById("input");

let history=[];

function add(text,user){
  const div=document.createElement("div");
  div.className="msg flex "+(user?"justify-end":"");

  div.innerHTML=`
    <div class="
      px-4 py-2 rounded-2xl max-w-[75%]
      ${user ? "bg-blue-500 text-white rounded-br-sm" : "bg-zinc-800 text-white rounded-bl-sm"}
    ">
      ${text}
    </div>
  `;

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

form.onsubmit=async(e)=>{
  e.preventDefault();
  if(!input.value) return;

  add(input.value,true);
  history.push({role:"user",content:input.value});
  input.value="";

  const typing=document.createElement("div");
  typing.className="msg text-zinc-400 text-sm px-2";
  typing.innerText="A.N.S.H is typing…";
  chat.appendChild(typing);

  try{
    const res=await fetch("/.netlify/functions/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({messages:history})
    });

    const data=await res.json();
    chat.removeChild(typing);

    const reply=data.choices?.[0]?.message?.content || "No response";
    add(reply,false);

    history.push({role:"assistant",content:reply);
  }
  catch(err){
    chat.removeChild(typing);
    add("Connection error ⚠️",false);
  }
}
</script>

</body>
</html>
